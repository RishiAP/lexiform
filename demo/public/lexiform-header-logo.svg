<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 120" width="320" height="120" role="img">
  <title>Lexiform</title>
  <desc>Lexiform — Lexical-based drop-in React rich text editor</desc>

  <defs>
    <style>
      .lf-word { font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 46px; font-weight: 300; letter-spacing: -0.5px; fill: #1E1B4B; }
      .lf-word-bold { font-weight: 600; fill: #4F46E5; }
    </style>
  </defs>

  <!-- Icon mark -->
  <g>
    <!-- Rounded square -->
    <rect x="0" y="0" width="110" height="110" rx="22" fill="#4F46E5"/>

    <!-- L vertical bar -->
    <rect x="24" y="20" width="18" height="70" rx="5" fill="white" opacity="0.95"/>
    <!-- L horizontal bar -->
    <rect x="24" y="73" width="62" height="17" rx="5" fill="white" opacity="0.95"/>

    <!-- Editor text lines -->
    <line x1="52" y1="31" x2="87" y2="31" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.45"/>
    <line x1="52" y1="43" x2="81" y2="43" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.35"/>
    <line x1="52" y1="55" x2="76" y2="55" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.25"/>

    <!-- Cursor blink -->
    <rect x="88" y="28" width="3.5" height="18" rx="1.75" fill="#A5B4FC"/>
  </g>

  <!-- Wordmark: "lexi" light + "form" bold -->
  <text x="130" y="79" class="lf-word">lexi<tspan class="lf-word-bold">form</tspan></text>

</svg>