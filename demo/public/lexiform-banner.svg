<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img">
  <title>Lexiform — Modern React Rich Text Editor</title>
  <desc>A highly polished, ultra-lightweight, headless-compatible drop-in React rich text editor built on Lexical.</desc>

  <rect width="1200" height="630" fill="#0F0A2E"/>

  <g opacity="0.06" fill="#818CF8">
    <circle cx="100" cy="80" r="2"/><circle cx="220" cy="80" r="2"/><circle cx="340" cy="80" r="2"/><circle cx="460" cy="80" r="2"/><circle cx="580" cy="80" r="2"/><circle cx="700" cy="80" r="2"/><circle cx="820" cy="80" r="2"/><circle cx="940" cy="80" r="2"/><circle cx="1060" cy="80" r="2"/><circle cx="1180" cy="80" r="2"/>
    <circle cx="100" cy="200" r="2"/><circle cx="220" cy="200" r="2"/><circle cx="340" cy="200" r="2"/><circle cx="460" cy="200" r="2"/><circle cx="580" cy="200" r="2"/><circle cx="700" cy="200" r="2"/><circle cx="820" cy="200" r="2"/><circle cx="940" cy="200" r="2"/><circle cx="1060" cy="200" r="2"/><circle cx="1180" cy="200" r="2"/>
    <circle cx="100" cy="320" r="2"/><circle cx="220" cy="320" r="2"/><circle cx="340" cy="320" r="2"/><circle cx="460" cy="320" r="2"/><circle cx="580" cy="320" r="2"/><circle cx="700" cy="320" r="2"/><circle cx="820" cy="320" r="2"/><circle cx="940" cy="320" r="2"/><circle cx="1060" cy="320" r="2"/><circle cx="1180" cy="320" r="2"/>
    <circle cx="100" cy="440" r="2"/><circle cx="220" cy="440" r="2"/><circle cx="340" cy="440" r="2"/><circle cx="460" cy="440" r="2"/><circle cx="580" cy="440" r="2"/><circle cx="700" cy="440" r="2"/><circle cx="820" cy="440" r="2"/><circle cx="940" cy="440" r="2"/><circle cx="1060" cy="440" r="2"/><circle cx="1180" cy="440" r="2"/>
    <circle cx="100" cy="560" r="2"/><circle cx="220" cy="560" r="2"/><circle cx="340" cy="560" r="2"/><circle cx="460" cy="560" r="2"/><circle cx="580" cy="560" r="2"/><circle cx="700" cy="560" r="2"/><circle cx="820" cy="560" r="2"/><circle cx="940" cy="560" r="2"/><circle cx="1060" cy="560" r="2"/><circle cx="1180" cy="560" r="2"/>
  </g>

  <ellipse cx="980" cy="140" rx="320" ry="180" fill="#4F46E5" opacity="0.10"/>
  <ellipse cx="200" cy="520" rx="250" ry="140" fill="#7C3AED" opacity="0.08"/>

  <!-- LEFT SIDE -->

  <g transform="translate(80, 56)">
    <rect x="0" y="0" width="86" height="86" rx="17" fill="#4F46E5"/>
    <rect x="18" y="14" width="13" height="58" rx="4.5" fill="white" opacity="0.95"/>
    <rect x="18" y="57" width="50" height="13" rx="4.5" fill="white" opacity="0.95"/>
    <line x1="38" y1="24" x2="68" y2="24" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.50"/>
    <line x1="38" y1="38" x2="62" y2="38" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.35"/>
    <line x1="38" y1="50" x2="55" y2="50" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.22"/>
    <rect x="70" y="20" width="4" height="16" rx="2" fill="#A5B4FC"/>
  </g>

  <text x="184" y="122" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="46" font-weight="300" fill="#E0E7FF" letter-spacing="-0.5">lexi<tspan font-weight="600" fill="#818CF8">form</tspan></text>

  <line x1="80" y1="174" x2="520" y2="174" stroke="#4F46E5" stroke-width="0.8" opacity="0.4"/>

  <text x="80" y="248" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="58" font-weight="700" fill="#FFFFFF" letter-spacing="-1">Modern React</text>
  <text x="80" y="316" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="58" font-weight="700" fill="#FFFFFF" letter-spacing="-1">Rich Text <tspan fill="#818CF8">Editor</tspan></text>

  <text x="80" y="360" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="19" font-weight="400" fill="#94A3B8">Lightweight · Headless-compatible · Drop-in React component</text>

  <rect x="80" y="388" width="152" height="36" rx="18" fill="#1E1B4B" stroke="#4F46E5" stroke-width="1.2"/>
  <text x="156" y="411" text-anchor="middle" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="500" fill="#818CF8">Lexical-based</text>

  <rect x="244" y="388" width="128" height="36" rx="18" fill="#1E1B4B" stroke="#4F46E5" stroke-width="1.2"/>
  <text x="308" y="411" text-anchor="middle" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="500" fill="#818CF8">/ Commands</text>

  <rect x="384" y="388" width="126" height="36" rx="18" fill="#1E1B4B" stroke="#4F46E5" stroke-width="1.2"/>
  <text x="447" y="411" text-anchor="middle" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="500" fill="#818CF8">JSON output</text>

  <text x="80" y="548" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="15" fill="#475569" letter-spacing="0.2">lexiform-editor.vercel.app</text>
  <text x="80" y="574" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="14" fill="#374151">Built on Lexical <tspan fill="#4F46E5"> · </tspan><tspan fill="#6366F1">by RishiAP</tspan></text>

  <!-- RIGHT SIDE: Editor window — tall card from y=30 to y=600 -->

  <rect x="648" y="30" width="474" height="570" rx="14" fill="#1A1535" stroke="#2D2B55" stroke-width="1"/>

  <!-- Title bar -->
  <rect x="648" y="30" width="474" height="44" rx="14" fill="#1E1B4B"/>
  <rect x="648" y="58" width="474" height="16" fill="#1E1B4B"/>
  <circle cx="678" cy="52" r="7" fill="#FF5F57" opacity="0.85"/>
  <circle cx="700" cy="52" r="7" fill="#FFBD2E" opacity="0.85"/>
  <circle cx="722" cy="52" r="7" fill="#28CA41" opacity="0.85"/>
  <text x="746" y="57" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="13" fill="#6B7280">lexiform-demo.tsx</text>

  <!-- Toolbar — right below title bar -->
  <rect x="648" y="74" width="474" height="40" fill="#161230"/>
  <line x1="648" y1="74" x2="1122" y2="74" stroke="#2D2B55" stroke-width="0.8"/>
  <line x1="648" y1="114" x2="1122" y2="114" stroke="#2D2B55" stroke-width="0.8"/>

  <text x="668" y="100" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="700" fill="#818CF8">B</text>
  <text x="690" y="100" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="16" font-style="italic" fill="#64748B">I</text>
  <text x="710" y="100" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="16" fill="#64748B" text-decoration="underline">U</text>
  <line x1="734" y1="78" x2="734" y2="112" stroke="#2D2B55" stroke-width="0.8"/>
  <text x="748" y="100" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="15" fill="#64748B">H1   H2   H3</text>
  <line x1="830" y1="78" x2="830" y2="112" stroke="#2D2B55" stroke-width="0.8"/>
  <text x="844" y="100" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="15" fill="#64748B">{ }   ≡   ⁞≡</text>
  <line x1="916" y1="78" x2="916" y2="112" stroke="#2D2B55" stroke-width="0.8"/>
  <text x="930" y="100" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="15" fill="#64748B">Link   Img   Table</text>

  <!-- Editor content -->
  <text x="672" y="158" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="700" fill="#E2E8F0">Welcome to Lexiform!</text>
  <text x="672" y="188" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="15" fill="#94A3B8">Type '/' to open the component picker and insert</text>
  <text x="672" y="210" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="15" fill="#94A3B8">equations, polls, tables, and more.</text>

  <line x1="672" y1="230" x2="1108" y2="230" stroke="#2D2B55" stroke-width="0.8"/>

  <!-- Slash command popup -->
  <rect x="670" y="242" width="254" height="286" rx="10" fill="#1E1B4B" stroke="#4F46E5" stroke-width="1"/>
  <text x="690" y="266" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="11" fill="#64748B" letter-spacing="1.2">INSERT BLOCK</text>

  <rect x="674" y="274" width="246" height="34" rx="6" fill="#2D2A5E"/>
  <text x="692" y="296" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="15" font-weight="600" fill="#E0E7FF">Table</text>
  <text x="754" y="296" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="13" fill="#6B7280">Insert a table</text>

  <text x="692" y="330" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="15" fill="#94A3B8">Equation</text>
  <text x="692" y="364" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="15" fill="#94A3B8">Poll</text>
  <text x="692" y="398" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="15" fill="#94A3B8">Code block</text>
  <text x="692" y="432" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="15" fill="#94A3B8">Image</text>
  <text x="692" y="466" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="15" fill="#94A3B8">Divider</text>
  <text x="692" y="500" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="15" fill="#94A3B8">Horizontal rule</text>
  <text x="692" y="520" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="13" fill="#4B5563">...</text>

  <!-- Cursor -->
  <rect x="672" y="243" width="3" height="22" rx="1.5" fill="#818CF8" opacity="0.9"/>

  <!-- Drop-in component badge — bottom right corner of editor, fully visible -->
  <rect x="940" y="555" width="172" height="30" rx="8" fill="#1E1B4B" stroke="#4F46E5" stroke-width="1"/>
  <text x="1026" y="575" text-anchor="middle" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="500" fill="#818CF8">Drop-in component</text>

</svg>